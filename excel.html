<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#155e75" />
    <title>工资条管理 Excel 版</title>
    <script>
      if (new URLSearchParams(location.search).has("embedded")) {
        document.documentElement.classList.add("embedded");
      }
    </script>
    <link rel="icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">老板工资助手</p>
          <h1>工资条管理 Excel 版</h1>
        </div>
        <div class="topbar-actions">
          <a class="button-like" href="./index.html">切换数据库版</a>
          <div class="status-pill" id="syncStatus">未导入</div>
        </div>
      </header>

      <section class="workspace">
        <nav class="tabs excel-tabs" aria-label="Excel 版功能">
          <button class="tab active" data-panel="excel-panel-payroll" type="button">算工资</button>
          <button class="tab" data-panel="excel-panel-data" type="button">Excel数据</button>
          <button class="tab" data-panel="excel-panel-worker-stats" type="button">统计</button>
        </nav>

        <section class="panel active" id="excel-panel-payroll">
          <div class="panel-title">
            <div>
              <h2>生成工资条</h2>
              <p>粘贴老板平时记的请假内容，系统会用已保存的 Excel 工人资料匹配并生成工资条。</p>
            </div>
          </div>

          <div class="month-row" hidden>
            <label>
              年份兜底
              <input id="yearInput" inputmode="numeric" type="number" min="2020" max="2100" />
            </label>
          </div>

          <label class="field-block">
            请假记录
            <textarea id="attendanceInput" rows="8" placeholder="例如：&#10;6月&#10;赵师 9，/14，20/，22/，23/，27，预支1800元。&#10;范师 15，30，"></textarea>
          </label>

          <div class="actions sticky-actions">
            <button class="primary" id="generateBtn" type="button">生成工资条</button>
            <button id="sampleAttendanceBtn" type="button">示例数据</button>
          </div>

          <div class="summary-grid" id="summaryGrid"></div>
          <section class="slip-list" id="slipList" aria-label="单人工资条"></section>
          <section class="result-summary" id="resultSummary" aria-label="工资汇总"></section>
        </section>

        <section class="panel" id="excel-panel-data">
          <div class="panel-title">
            <div>
              <h2>Excel 工人资料</h2>
              <p>默认已内置当前真实工人资料。后续工人变更时，下载当前数据，改完再上传，上传成功后会保存为本机最新版。</p>
            </div>
          </div>

          <div class="upload-zone" id="uploadZone">
            <strong>拖拽 Excel 到这里上传</strong>
            <p class="meta">也可以点击下面的“上传新版 Excel”。支持 .xlsx / .xls。</p>
          </div>

          <div class="actions">
            <a class="button-like primary-link" href="./templates/工人资料_2026-07-23版.xlsx" download>下载真实数据 Excel</a>
            <button id="downloadCurrentBtn" type="button">下载当前数据</button>
            <label class="button-like">
              上传新版 Excel
              <input id="excelInput" type="file" accept=".xlsx,.xls" hidden />
            </label>
            <button id="clearExcelBtn" class="danger" type="button">恢复内置真实数据</button>
          </div>

          <p class="meta" id="dataStatus">正在加载内置真实工人资料。</p>
          <div class="data-health" id="dataHealth"></div>
          <div class="worker-list" id="workerList"></div>
        </section>

        <section class="panel" id="excel-panel-worker-stats">
          <div class="panel-title">
            <div>
              <h2>工人统计</h2>
              <p>这里只查看，不修改。工龄、底薪和闲置时间会按当前日期和已保存 Excel 数据自动计算。</p>
            </div>
          </div>
          <div class="worker-stats" id="excelWorkerStats"></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="./excel-app.js?v=20260723k"></script>
  </body>
</html>
